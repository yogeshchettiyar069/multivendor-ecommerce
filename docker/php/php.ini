; Application PHP settings (production-oriented).
memory_limit = 256M
expose_php = Off
date.timezone = UTC

; File uploads (product images). Keep in sync with nginx client_max_body_size.
file_uploads = On
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 20

max_execution_time = 60
max_input_time = 60

; Performance
realpath_cache_size = 4096K
realpath_cache_ttl = 600
